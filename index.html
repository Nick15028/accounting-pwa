<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">

    <!-- 手機 RWD / PWA 必備 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA 設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">

    <!-- iPhone 加到主畫面設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="記帳系統">

    <title>記帳系統</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: #edf1f5;
        }

        body {
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: #edf1f5;
        }

        .header {
            background: linear-gradient(135deg, #2e7d32, #66bb6a);
            padding: 40px 24px 70px;
            color: white;
            border-bottom-left-radius: 36px;
            border-bottom-right-radius: 36px;
        }

        .header h1 {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
        }

        .header p {
            margin-top: 12px;
            font-size: 18px;
            opacity: 0.95;
        }

        .card {
            background: white;
            margin: -40px 18px 24px;
            padding: 22px;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .type-group {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
        }

        .type-btn {
            flex: 1;
            height: 64px;
            border-radius: 20px;
            border: 2px solid #ddd;
            background: #f7f7f7;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .expense.active {
            background: #ffebee;
            border-color: #ef5350;
            color: #c62828;
        }

        .income.active {
            background: #e8f5e9;
            border-color: #43a047;
            color: #2e7d32;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 18px;
            padding: 16px;
            font-size: 18px;
            background: white;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #4caf50;
        }

        input,
        select {
            height: 60px;
        }

        textarea {
            min-height: 110px;
            resize: none;
        }

        .submit-btn {
            width: 100%;
            height: 64px;
            border: none;
            border-radius: 22px;
            margin-top: 28px;
            background: #d32f2f;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .summary {
            margin-top: 28px;
            background: #f7f9fc;
            border-radius: 22px;
            padding: 20px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-size: 18px;
        }

        .summary-item:last-child {
            margin-bottom: 0;
        }

        .income-text {
            color: #2e7d32;
            font-weight: bold;
        }

        .expense-text {
            color: #c62828;
            font-weight: bold;
        }

        .balance-text {
            color: #1565c0;
            font-weight: bold;
        }

        .msg {
            margin-top: 16px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            min-height: 22px;
        }

        @media screen and (max-width: 480px) {
            .header {
                padding: 34px 22px 64px;
            }

            .header h1 {
                font-size: 32px;
            }

            .header p {
                font-size: 16px;
            }

            .card {
                margin-left: 12px;
                margin-right: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <div class="header">
            <h1>記帳系統</h1>
            <p>快速記錄每日收入與支出</p>
        </div>

        <div class="card">

            <div class="type-group">
                <button class="type-btn expense active" id="expenseBtn" onclick="setType('支出')">
                    支出
                </button>

                <button class="type-btn income" id="incomeBtn" onclick="setType('收入')">
                    收入
                </button>
            </div>

            <label>日期</label>
            <input type="date" id="date">

            <label>金額</label>
            <input type="number" id="amount" placeholder="請輸入金額">

            <label>類別</label>
            <select id="category">
                <option>🍚 餐費</option>
                <option>🚗 交通</option>
                <option>🛒 購物</option>
                <option>🎮 娛樂</option>
                <option>💼 薪資</option>
                <option>📚 教材</option>
                <option>💻 設備</option>
                <option>📦 其他</option>
            </select>

            <label>備註</label>
            <textarea id="note" placeholder="可不填"></textarea>

            <button class="submit-btn" id="submitBtn" onclick="submitRecord()">
                新增支出
            </button>

            <div class="msg" id="msg"></div>

            <div class="summary">
                <div class="summary-item">
                    <span>總收入</span>
                    <span class="income-text" id="income">$0</span>
                </div>

                <div class="summary-item">
                    <span>總支出</span>
                    <span class="expense-text" id="expense">$0</span>
                </div>

                <div class="summary-item">
                    <span>目前結餘</span>
                    <span class="balance-text" id="balance">$0</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 改成你的 Apps Script Web App 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyvwp3F-nGczu7W6X4QE8ZcQt8PFLVuSnl61YoF9zQhbXPYPV8na_M0h55ZPVTrxIgk/exec";

        let currentType = "支出";

        document.getElementById("date").valueAsDate = new Date();

        function setType(type) {
            currentType = type;

            const expenseBtn = document.getElementById("expenseBtn");
            const incomeBtn = document.getElementById("incomeBtn");
            const submitBtn = document.getElementById("submitBtn");

            expenseBtn.classList.remove("active");
            incomeBtn.classList.remove("active");

            if (type === "支出") {
                expenseBtn.classList.add("active");
                submitBtn.innerText = "新增支出";
                submitBtn.style.background = "#d32f2f";
            } else {
                incomeBtn.classList.add("active");
                submitBtn.innerText = "新增收入";
                submitBtn.style.background = "#2e7d32";
            }
        }

        function callApi(action, payload = {}) {
            return fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: action,
                    ...payload
                })
            }).then(response => response.json());
        }

        function submitRecord() {
            const submitBtn = document.getElementById("submitBtn");

            const data = {
                date: document.getElementById("date").value,
                type: currentType,
                category: document.getElementById("category").value,
                amount: document.getElementById("amount").value,
                note: document.getElementById("note").value
            };

            if (!data.amount || Number(data.amount) <= 0) {
                showMessage("請輸入正確金額", false);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "儲存中...";

            callApi("addRecord", {
                record: data
            })
                .then(result => {
                    if (!result.success) {
                        throw new Error(result.message || "新增失敗");
                    }

                    showMessage("新增成功", true);

                    document.getElementById("amount").value = "";
                    document.getElementById("note").value = "";

                    loadSummary();
                })
                .catch(error => {
                    showMessage("新增失敗：" + error.message, false);
                });
        }

        function loadSummary() {
            callApi("getSummary")
                .then(summary => {
                    const income = Number(summary.income || 0);
                    const expense = Number(summary.expense || 0);
                    const balance = Number(summary.balance || 0);

                    document.getElementById("income").innerText =
                        "$" + income.toLocaleString();

                    document.getElementById("expense").innerText =
                        "$" + expense.toLocaleString();

                    document.getElementById("balance").innerText =
                        "$" + balance.toLocaleString();
                })
                .catch(() => {
                    showMessage("統計資料載入失敗", false);
                });
        }

        function showMessage(text, success) {
            const msg = document.getElementById("msg");

            msg.innerText = text;
            msg.style.color = success ? "#2e7d32" : "#d32f2f";

            setTimeout(() => {
                msg.innerText = "";
            }, 3000);
        }

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js")
                .then(() => {
                    console.log("Service Worker registered");
                })
                .catch(error => {
                    console.log("Service Worker failed", error);
                });
        }

        loadSummary();
    </script>

</body>

</html>
